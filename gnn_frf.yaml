# ============================================================
# gnn_frf.yaml — GNN 编码器 + 逐点FRF解码器 (预留)
# ============================================================
# GNNEncoder 当前为占位实现，等价于 SimplePointEncoder。
# 待网格拓扑数据确定后启用真正的图卷积。

encoder_type: "gnn"
lr: 0.001

encoder_kwargs:
  in_channels: 0
  hidden_dim: 256
  out_dim: 256
  coord_dim: 3
  n_layers: 3

decoder_kwargs:
  in_dim: 256
  n_freqs: 300
  hidden_dim: 256
  n_layers: 3
  chunk_size: 512
