# ============================================================
# simple_frf.yaml — 简单MLP编码器(Baseline) + 逐点FRF解码器
# ============================================================

encoder_type: "simple"
lr: 0.001

encoder_kwargs:
  in_channels: 0
  hidden_dim: 256
  out_dim: 256
  coord_dim: 3
  n_layers: 4

decoder_kwargs:
  in_dim: 256
  n_freqs: 300
  hidden_dim: 256
  n_layers: 3
  chunk_size: 512
