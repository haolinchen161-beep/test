# ============================================================
# pointnet_frf.yaml — PointNet 编码器 + 逐点FRF解码器
# ============================================================

encoder_type: "pointnet"
lr: 0.001

encoder_kwargs:
  in_channels: 0          # 附加点特征维度 (0 = 仅坐标)
  hidden_dim: 256
  out_dim: 256
  coord_dim: 3            # 坐标维度 (2或3)
  n_layers: 3             # 局部MLP层数
  global_feat_dim: 256    # 全局特征维度

decoder_kwargs:
  in_dim: 256             # = encoder out_dim
  n_freqs: 300            # 频率点数
  hidden_dim: 256         # FiLM MLP 隐藏层宽度
  n_layers: 3             # 解码MLP层数
  chunk_size: 512         # 分块大小 (控制显存)
